# Builds and pushes both Docker images (api, web) to the GitHub
# Container Registry on every push to main and on version tags.
#
# Images are published as:
#   ghcr.io/hmcbraida/arimaa-js/api
#   ghcr.io/hmcbraida/arimaa-js/web
#
# Tags follow the docker/metadata-action defaults:
#   - semver tags (v1.2.3) → 1.2.3, 1.2, 1, latest
#   - main branch push     → main + short SHA
#
# The GITHUB_TOKEN that Actions injects is sufficient for GHCR — no
# extra secrets are required as long as the package visibility is set
# to match the repository.

name: Docker publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  # Allow manual triggers from the Actions UI.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image name prefix; individual images append /api or /web.
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/arimaa-js

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      # Build both images in parallel; a failure in one does not cancel
      # the other so we see all errors in a single run.
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: docker/server.Dockerfile
          - image: web
            dockerfile: docker/nginx.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enables multi-platform builds and layer caching via BuildKit.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives OCI-compliant tags and labels from git metadata:
      #   - branch push → <branch>-<short-sha>, e.g. main-abc1234
      #   - version tag → semver components + latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch,suffix=-{{sha}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GHCR OCI cache to speed up subsequent builds.
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache,mode=max
