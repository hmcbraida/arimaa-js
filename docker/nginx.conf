# nginx site config for the Arimaa SPA.
#
# Three responsibilities:
#
# 1. Serve the hashed static SPA assets out of /usr/share/nginx/html.
# 2. Reverse-proxy `/api/*` HTTP requests to the API container.
# 3. Reverse-proxy `/api/ws` WebSocket upgrade requests to the same
#    backend, with the right Upgrade / Connection headers so the
#    handshake completes correctly.
#
# The SPA uses TanStack Router with browser history, so unknown paths
# must fall back to `index.html` (single-page app routing). The
# `try_files` directive at the bottom handles that.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket route — must come before the generic /api/ block so
    # the upgrade-specific headers are applied.
    location /api/ws {
        proxy_pass http://api:3001/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1d;
    }

    # All other API requests.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any path that does not exist on disk is rewritten
    # to /index.html so the client-side router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
